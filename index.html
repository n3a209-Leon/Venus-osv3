    async function resolveSyncConflict(conflict, choice) {
        if (!conflict || !conflict._key) return;
        var needsCloud = choice === 'local' || choice === 'both';
        if (needsCloud && (!firebaseUid || !navigator.onLine)) {
            alert('請先登入並連上網路，再套用本機版本');
            return;
        }
        setConflictBusyKey(conflict._key);
        try {
            if (conflict.kind === 'primary') {
                if (choice === 'local') {
                    var primaryResult = await window.fsSetGuarded(firebaseUid, conflict.originalKey, conflict.localValue, null, true);
                    if (!primaryResult || !primaryResult.ok) throw new Error('本機版本寫入失敗');
                    await idbSet(conflict.originalKey, conflict.localValue);
                    setSyncRevision(conflict.originalKey, primaryResult);
                } else {
                    await idbSet(conflict.originalKey, conflict.remoteValue);
                    setSyncRevision(conflict.originalKey, { revision:conflict.remoteRevision, deviceId:conflict.remoteDeviceId, updatedAt:conflict.remoteUpdatedAt });
                }
                clearDirtyKeys([conflict.originalKey]);
            } else if (conflict.kind === 'settings') {
                if (choice === 'local') {
                    var settingsResult = await window.fsSetGuarded(firebaseUid, conflict.originalKey, conflict.localValue, null, true);
                    if (!settingsResult || !settingsResult.ok) throw new Error('本機設定寫入失敗');
                    setSyncRevision(conflict.originalKey, settingsResult);
                    applySettingsDocument(conflict.originalKey, conflict.localValue);
                } else {
                    applySettingsDocument(conflict.originalKey, conflict.remoteValue || {});
                    setSyncRevision(conflict.originalKey, {
                        revision:conflict.remoteRevision,
                        deviceId:conflict.remoteDeviceId,
                        updatedAt:conflict.remoteUpdatedAt
                    });
                }
                clearSettingsDirty([conflict.originalKey]);
            } else if (conflict.kind === 'wp' || conflict.kind === 'gr') {
                var envKey = conflict.localEnvelopeKey || conflict.originalKey;
                if (choice === 'remote') {
                    if (conflict.remoteValue) await putSecondaryLocal(conflict.kind, conflict.classKey, conflict.remoteValue, 'synced', false);
                    else await idbDelete(envKey);
                } else if (choice === 'local') {
                    var localResult = conflict.deleted
                        ? await window.secondaryDeleteGuarded(firebaseUid, conflict.kind, conflict.recordId, null, true)
                        : await window.secondarySaveGuarded(firebaseUid, conflict.kind, conflict.localValue, null, true);
                    if (!localResult || !localResult.ok) throw new Error('本機版本寫入失敗');
                    if (conflict.deleted) await idbDelete(envKey);
                    else await putSecondaryLocal(conflict.kind, conflict.classKey, localResult.value, 'synced', false);
                } else if (choice === 'both' && conflict.kind === 'wp') {
                    var mergedPlan = mergeWeeklyConflictRecords(conflict.localValue, conflict.remoteValue);
                    var mergeResult = await window.secondarySaveGuarded(firebaseUid, 'wp', mergedPlan, null, true);
                    if (!mergeResult || !mergeResult.ok) throw new Error('合併版本寫入失敗');
                    await putSecondaryLocal('wp', conflict.classKey, mergeResult.value, 'synced', false);
                } else if (choice === 'both' && conflict.kind === 'gr') {
                    if (conflict.remoteValue) await putSecondaryLocal('gr', conflict.classKey, conflict.remoteValue, 'synced', false);
                    var copy = Object.assign({}, conflict.localValue || {});
                    delete copy._syncRevision; delete copy._syncDeviceId; delete copy._syncUpdatedAt;
                    copy.id = String(copy.id || 'gr') + '_copy_' + Date.now();
                    copy.updatedAt = Date.now();
                    copy.conflictCopyOf = conflict.recordId || '';
                    await putSecondaryLocal('gr', conflict.classKey, copy, 'pending', false);
                    var copySync = await syncSecondaryData(firebaseUid, conflict.classKey);
                    if (copySync.failed > 0 || copySync.conflicts > 0) throw new Error('副本已留在本機，稍後請再同步');
                }
            }
            await idbDelete(conflict._key);
            await loadSyncConflicts();
            await Promise.all([grLoad(), wpLoadPlans()]);
            setDriveError('');
            if (syncConflicts.length <= 1) setShowConflictCenter(false);

            alert('衝突處理未完成：' + String(e && e.message || e));

                    if (!value) return { key:key, skipped:true };
                    var expectedRevision = getSyncRevision(key);
                    if ((expectedRevision === null || expectedRevision === undefined) && readDirtyMap()[key]) expectedRevision = -1;
                    var result = await window.fsSetGuarded(firebaseUid, key, value, expectedRevision, false);
                    if (result && result.conflict) {

                        try { window.dispatchEvent(new CustomEvent('limu-conflict-change')); } catch(exEvent) {}
                        return { key:key, conflict:true };
                    }
                    if (result && result.ok) {

                        return { key:key, ok:true };

                    return { key:key, failed:true };

            var pfx = classPrefix();

                try {
                    var k = dayKeys[i];

                    if (!raw) continue;
                    var parsed = (typeof raw === 'string') ? JSON.parse(raw) : raw;
                    var d = deser(parsed);
                    // 出勤：personal/sick/public/late
                    ['personal','sick','public','late'].forEach(function(t) {
                        if (d.attendance[t] && d.attendance[t].has(seat)) attend[t].push(dateStr);
                    });
                    // 作業缺交：需知道該日該座號屬於哪一組

                    var grp = dGroups.find(function(g){ return g.members && g.members.includes(seat); });
                    if (grp) {
                        (d.rows || []).forEach(function(r) {
                            if (!r.hwName) return;
                            var done = r.groupData[grp.id] || new Set();
                            if (!done.has(seat)) {
                                hwMissByName[r.hwName] = (hwMissByName[r.hwName] || 0) + 1;
                                var wn = getWeekNum(dateStr, sem);
                                var wkey = (wn !== null && wn !== undefined) ? wn : -1;
                                hwMissByWeek[wkey] = (hwMissByWeek[wkey] || 0) + 1;

            counsel = grForClass(grRecords).filter(function(r){ return (r.studentSeats||[]).includes(seat); })
                .slice().sort(function(a,b){ return (a.date||'').localeCompare(b.date||''); });

<script>
// ── Nebula 動態星點系統 ─────────────────────────────────────
(function() {
  function initStars() {
    var app = document.querySelector('[data-theme="nebula"]');
    if (!app) return;
    // 避免重複建立
    if (document.getElementById('nebula-canvas')) return;

    var canvas = document.createElement('canvas');
    canvas.id = 'nebula-canvas';
    canvas.style.cssText = 'position:fixed;inset:0;z-index:0;pointer-events:none;opacity:.7';
    document.body.insertBefore(canvas, document.body.firstChild);

    var ctx = canvas.getContext('2d');
    var stars = [];
    var W, H;

    function resize() {
      W = canvas.width  = window.innerWidth;
      H = canvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener('resize', resize);

    // 建立星星
    for (var i = 0; i < 160; i++) {
      stars.push({
        x: Math.random() * 2,      // 相對位置 0-1
        y: Math.random() * 2,
        r: Math.random() * 1.4 + 0.2,
        speed: Math.random() * 0.0003 + 0.00008,
        phase: Math.random() * Math.PI * 2,
        color: ['#fff','#e8e0ff','#c8d8ff','#b0c8ff','#d4b8ff'][Math.floor(Math.random()*5)]
      });
    }

    var t = 0;
    function draw() {
      // 非星雲主題、背景分頁或減少動態效果時，停止每幀繪製
      if (!document.querySelector('[data-theme="nebula"]') || document.hidden || window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
        canvas.style.opacity = '0';
        setTimeout(draw, 600);
        return;
      }
      canvas.style.opacity = '.7';
      ctx.clearRect(0, 0, W, H);
      t += 0.008;

      for (var i = 0; i < stars.length; i++) {
        var s = stars[i];
        var x = ((s.x + t * s.speed * 0.3) % 1) * W;
        var y = ((s.y + t * s.speed) % 1) * H;
        var twinkle = 0.4 + 0.6 * Math.abs(Math.sin(t * 1.5 + s.phase));

        ctx.save();
        ctx.globalAlpha = twinkle * 0.85;
        ctx.fillStyle = s.color;
        ctx.shadowColor = s.color;
        ctx.shadowBlur = s.r * 3;
        ctx.beginPath();
        ctx.arc(x, y, s.r, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }

      // 偶爾加入流星
      if (Math.random() < 0.004) {
        var mx = Math.random() * W;
        var my = Math.random() * H * 0.5;
        var grad = ctx.createLinearGradient(mx, my, mx + 80, my + 30);
        grad.addColorStop(0, 'rgba(255,255,255,0)');
        grad.addColorStop(0.5, 'rgba(220,200,255,0.6)');
        grad.addColorStop(1, 'rgba(255,255,255,0)');
        ctx.strokeStyle = grad;
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(mx, my);
        ctx.lineTo(mx + 80, my + 30);
        ctx.stroke();
      }

      requestAnimationFrame(draw);
    }
    draw();
  }

  // 等 DOM ready 後初始化，並監聽主題切換
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', function() { setTimeout(initStars, 500); });
  } else {
    setTimeout(initStars, 500);
  }

  // 主題切換時重新初始化
  var _origBody = document.body;
  var themeObserver = new MutationObserver(function(mutations) {
    mutations.forEach(function(m) {
      if (m.type === 'attributes' && m.attributeName === 'data-theme') return;
      // 檢查是否有 nebula app
      var nebulaApp = document.querySelector('[data-theme="nebula"]');
      if (nebulaApp && !document.getElementById('nebula-canvas')) {
        initStars();
      }
    });
  });
  // 1. 🟢 讓原本的主程式完美結束（包含主題監聽器）
  try {
    themeObserver.observe(document.body, { childList: true, subtree: true, attributes: true });
  } catch(e) {}
})(); 

// 2. 🟢 獨立出來的 PWA 點擊修復區塊（修正了括號，安全閉合）
(function() {
  try {
    var isPWA = window.navigator.standalone === true ||
                window.matchMedia('(display-mode:standalone)').matches;
    if (!isPWA) return;
    // 消除 300ms 延遲和觸碰偏移
    document.addEventListener('touchstart', function(){}, {passive:true});
    // 加入全域 touch-action 和 cursor:pointer
    var style = document.createElement('style');
    style.textContent = [
      '* { touch-action: manipulation !important; -webkit-tap-highlight-color: transparent !important; }',
      'button, [onclick], a, input, select, textarea { cursor: pointer !important; }',
      // PWA 模式下確保 body 不因 status bar 偏移
      '@supports (padding-top: env(safe-area-inset-top)) {',
      '  body { padding-top: env(safe-area-inset-top) !important; }',
      '}'
    ].join('');
    document.head.appendChild(style);
    // 修正：確保 root div 的 pointer-events 正常
    var root = document.getElementById('root');
    if (root) {
      root.style.pointerEvents = 'auto';
      root.style.webkitUserSelect = 'auto';
    }
  } catch(e) {}
})();


</script>

<script>
// ── Ripple 點擊波紋效果 ──
(function() {
  document.addEventListener('click', function(e) {
    var btn = e.target.closest('button');
    if (!btn) return;
    var wave = document.createElement('span');
    wave.className = 'ripple-wave';
    var rect = btn.getBoundingClientRect();
    var size = Math.max(rect.width, rect.height);
    wave.style.width = wave.style.height = size + 'px';
    wave.style.left = (e.clientX - rect.left - size / 2) + 'px';
    wave.style.top  = (e.clientY - rect.top  - size / 2) + 'px';
    var prev = btn.style.position;
    var prevOv = btn.style.overflow;
    btn.style.position = 'relative';
    btn.style.overflow = 'hidden';
    btn.appendChild(wave);
    setTimeout(function() {
      wave.remove();
      btn.style.position = prev;
      btn.style.overflow = prevOv;
    }, 450);
  }, true);
})();
</script>

<script>
// ── Service Worker 註冊（PWA 離線支援）──
(function() {
  if (!('serviceWorker' in navigator)) return;
  var updateRegistration = null;
  var reloadingForUpdate = false;

  function showUpdateBar(registration, message, mismatch) {
    try {
      updateRegistration = registration || updateRegistration;
      var bar = document.getElementById('limu-update-bar');
      if (!bar) {
        bar = document.createElement('div');
        bar.id = 'limu-update-bar';
        bar.style.cssText = 'position:fixed;bottom:0;left:0;right:0;background:#1e3a5f;color:#fff;padding:12px 20px;font-size:13px;font-weight:700;z-index:99999;display:flex;align-items:center;justify-content:space-between;gap:12px;font-family:sans-serif';
        var updateText = document.createElement('span');
        updateText.id = 'limu-update-text';
        var updateButton = document.createElement('button');
        updateButton.id = 'limu-update-button';
        updateButton.style.cssText = 'background:#4fc3f7;border:none;border-radius:8px;padding:10px 16px;font-size:13px;font-weight:700;cursor:pointer;color:#0d2137;min-width:92px';
        bar.appendChild(updateText);
        bar.appendChild(updateButton);
        document.body.appendChild(bar);
      }
      var textNode = document.getElementById('limu-update-text');
      var buttonNode = document.getElementById('limu-update-button');
      textNode.textContent = message || '📦 App v12 已下載完成';
      buttonNode.textContent = mismatch ? '重新檢查' : '立即更新';
      buttonNode.setAttribute('aria-label', mismatch ? '重新檢查部署版本' : '啟用 App 新版本');
      buttonNode.onclick = function(){
        if (mismatch) { window.location.reload(); return; }
        var waiting = updateRegistration && updateRegistration.waiting;
        if (waiting) {
          buttonNode.disabled = true;
          buttonNode.textContent = '更新中…';
          waiting.postMessage({ type:'SKIP_WAITING' });
        } else if (updateRegistration) {
          updateRegistration.update();
        }
      };
    } catch(ex) {}
  }

  function checkBuildConsistency(reg) {
    var checkToken = Date.now();
    Promise.all([
      fetch('./version.json?check=' + checkToken, { cache:'no-store' }).then(function(response){
        if (!response.ok) throw new Error('version unavailable');
        return response.json();
      }),
      fetch('./sw.js?check=' + checkToken, { cache:'no-store' }).then(function(response){
        if (!response.ok) throw new Error('service worker unavailable');
        return response.text();
      })
    ]).then(function(results){
      var info = results[0], swText = results[1] || '';
      if (!info || info.buildId !== APP_BUILD_ID || info.cacheName !== APP_CACHE_NAME || swText.indexOf(APP_BUILD_ID) < 0 || swText.indexOf("CACHE_PREFIX + 'v12'") < 0) {
        showUpdateBar(reg, '⚠️ 部署檔案版本不一致，請重新上傳完整 v12 部署包', true);
      }
    }).catch(function(){ /* 離線時不顯示混版警告 */ });
    try {
      if (!reg.active || typeof MessageChannel === 'undefined') return;
      var channel = new MessageChannel();
      var timer = setTimeout(function(){ channel.port1.onmessage = null; }, 1200);
      channel.port1.onmessage = function(event){
        clearTimeout(timer);
        var info = event.data || {};
        if (info.buildId && info.buildId !== APP_BUILD_ID && !reg.waiting && !reg.installing) {
          showUpdateBar(reg, '📦 App v12 更新檔已發現，準備下載', false);
          reg.update();
        }
      };
      reg.active.postMessage({ type:'GET_BUILD_INFO' }, [channel.port2]);
    } catch(e) {}
  }

  navigator.serviceWorker.addEventListener('controllerchange', function() {
    if (reloadingForUpdate) return;
    reloadingForUpdate = true;
    window.location.reload();
  });

  window.addEventListener('load', function() {
    // 支援的瀏覽器會盡量將教師資料標記為持久儲存，降低系統自動清除風險。
    try {
      if (navigator.storage && navigator.storage.persisted && navigator.storage.persist) {
        navigator.storage.persisted().then(function(ok){ if (!ok) return navigator.storage.persist(); }).catch(function(){});
      }
    } catch(ePersist) {}
    navigator.serviceWorker.register('./sw.js').then(function(reg) {
      try { window._writeLog('step', 'SW registered, scope: ' + reg.scope); } catch(e) {}

      // 頁面開啟前就已下載完成的等待中版本，也要能顯示更新提示。
      if (reg.waiting && navigator.serviceWorker.controller) showUpdateBar(reg);

      // 偵測是否有新版本
      reg.addEventListener('updatefound', function() {
        var newWorker = reg.installing;
        newWorker.addEventListener('statechange', function() {
          if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
            showUpdateBar(reg);
          }
        });
      });
      checkBuildConsistency(reg);
      reg.update().catch(function(){});
    }).catch(function(err) {
      try { window._writeLog('error', 'SW register failed: ' + String(err)); } catch(e) {}
    });
  });

  // 離線/上線偵測
  function updateOnlineStatus() {
    var isOnline = navigator.onLine;
    try { window._writeLog('step', 'network: ' + (isOnline ? 'online' : 'offline')); } catch(e) {}
    // 上線後觸發同步
    if (isOnline) {
      // 通知 React App 網路恢復，觸發 Firestore 同步
      window.dispatchEvent(new CustomEvent('hw-network-online'));
    }
  }
  window.addEventListener('online', updateOnlineStatus);
  window.addEventListener('offline', updateOnlineStatus);
})();
